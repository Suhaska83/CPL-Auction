name: Deploy web-static to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web-static/**"
      - ".github/workflows/deploy-static.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web-static/package-lock.json

      - name: Configure Pages
        # Auto-enables Pages via API when the workflow has permissions, and
        # exposes ${{ steps.pages.outputs.base_path }} that we could use instead
        # of the VITE_BASE variable if you prefer zero manual configuration.
        id: pages
        uses: actions/configure-pages@v5

      - name: Install
        run: npm ci

      - name: Build
        env:
          # Falls back to actions/configure-pages' auto-detected base_path when
          # the VITE_BASE variable is unset. Works for both project pages
          # (/<repo>/) and custom domains (/).
          VITE_BASE: ${{ vars.VITE_BASE || steps.pages.outputs.base_path }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-static/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
